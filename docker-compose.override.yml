# docker-compose.override.yml
version: "3.9"

services:
  backend:
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./runtime:/data
      - ./backend:/app:delegated
    working_dir: /app
    command: >
      sh -lc "python -m flask --app app.py run --host=0.0.0.0 --port=8000 --debug"
    ports:
      - "8000:8000"

  frontend:
    environment:
      VITE_BACKEND_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    working_dir: /app
    command: >
      sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "8080:5173"